<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Himanshu Saini | Premium Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@200;300;400;500;700&display=swap" rel="stylesheet">
    <style>
        /* Global Reset & Typography */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            font-family: 'Montserrat', sans-serif;
            background-color: #050505;
            color: #ffffff;
            height: 100%;
            overflow: hidden; /* Hide main scrollbar */
        }

        /* Sticky Bar with Glassmorphism */
        .sticky-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 4rem;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.3s ease;
        }
        .brand-left {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .brand-name {
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(120deg, #ffffff, #888888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .brand-title {
            font-size: 0.75rem;
            font-weight: 400;
            letter-spacing: 2px;
            color: #a0a0a0;
            text-transform: uppercase;
        }
        .brand-right {
            display: flex;
            gap: 1.5rem;
            align-items: center;
        }
        .contact-link {
            font-weight: 300;
            font-size: 0.85rem;
            letter-spacing: 1px;
            color: #b0b0b0;
            text-decoration: none;
            transition: color 0.3s ease;
            position: relative;
        }
        .contact-link:hover {
            color: #ffffff;
        }
        .contact-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: #ffffff;
            transition: width 0.3s ease;
        }
        .contact-link:hover::after {
            width: 100%;
        }

        /* Full Screen Scroll Snapping Container */
        .container {
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
        }

        /* Individual Slides */
        .slide {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Dynamic Backgrounds Setup */
        .slide-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #0a0a0a; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* FIXED: Changed to positive z-index so it doesn't hide behind the body background */
            z-index: 1; 
            
            transform: scale(1.02);
            transition: transform 10s ease-out;
        }
        .slide.is-visible .slide-bg {
            transform: scale(1); /* Slow zoom-out effect on active slide */
        }
        .slide::after {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            
            /* FIXED: Slightly lighter gradient so the image is fully visible while text pops */
            background: linear-gradient(135deg, rgba(8,8,8,0.7) 0%, rgba(15,15,15,0.4) 100%);
            
            /* FIXED: Overlay sits directly above the image */
            z-index: 2; 
            pointer-events: none;
        }

        /* Two-Column Floating Content Wrapper */
        .content-wrapper {
            /* FIXED: Ensure content sits above the new background z-indexes */
            position: relative;
            z-index: 3; 

            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            padding: 4rem;
            max-width: 1200px;
            width: 90%;
            box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 0 40px rgba(255,255,255,0.02);
            
            display: flex;
            flex-direction: row;
            align-items: center;
            gap: 4rem;
            
            /* Initial Hidden State for Animation */
            opacity: 0;
            transform: translateY(80px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Left Column: Headings */
        .left-col {
            flex: 1;
            text-align: right;
            border-right: 1px solid rgba(255, 255, 255, 0.15);
            padding-right: 4rem;
        }

        /* Right Column: Details */
        .right-col {
            flex: 1.8;
            text-align: left;
        }

        /* Typography */
        .left-col h1 {
            font-size: 3.8rem;
            font-weight: 700;
            line-height: 1.1;
            background: linear-gradient(180deg, #ffffff 0%, #777777 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: capitalize;
        }

        .right-col h2 {
            font-size: 2.2rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: #ffffff;
            letter-spacing: 0.5px;
        }
        
        .right-col .subtitle {
            font-size: 1.1rem;
            font-weight: 400;
            color: #a0a0a0;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .right-col p {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cccccc;
            font-weight: 300;
            margin-bottom: 1rem;
        }

        .right-col ul {
            list-style: none;
        }

        .right-col ul li {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #cccccc;
            font-weight: 300;
            margin-bottom: 0.8rem;
            position: relative;
            padding-left: 1.5rem;
        }

        .right-col ul li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #ffffff;
            font-weight: bold;
        }

        .highlight {
            color: #ffffff;
            font-weight: 500;
            border-bottom: 1px solid rgba(255,255,255,0.3);
        }

        /* Intersection Observer Active State */
        .slide.is-visible .content-wrapper {
            opacity: 1;
            transform: translateY(0);
            /* Triggers endless floating animation after sliding in */
            animation: float 6s ease-in-out infinite alternate 1.2s;
        }

        /* Endless Floating Keyframes */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        /* Mobile View Responsive Tweaks */
        @media (max-width: 1000px) {
            .content-wrapper {
                padding: 3rem 2rem;
                gap: 2rem;
            }
            .left-col {
                padding-right: 2rem;
            }
            .left-col h1 {
                font-size: 2.8rem;
            }
            .right-col h2 {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .sticky-bar { 
                z-index: 3;
                padding: 1rem 1.5rem; 
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            .brand-left {
                align-items: center;
            }
            .brand-name { font-size: 1.1rem; }
            .brand-title { font-size: 0.65rem; }
            .brand-right {
                flex-wrap: wrap;
                justify-content: center;
                gap: 1rem;
            }
            .contact-link { font-size: 0.75rem; }
            
            .content-wrapper {
                flex-direction: column; /* Stacks to 1 column on mobile */
                gap: 1.5rem;
                padding: 2.5rem 1.5rem;
                text-align: center;
                margin-top: 5rem; /* Account for taller sticky header */
            }

            .left-col {
                border-right: none;
                border-bottom: 1px solid rgba(255, 255, 255, 0.15); /* Divider moves to bottom */
                padding-right: 0;
                padding-bottom: 1.5rem;
                text-align: center; /* Centers heading on mobile */
                width: 100%;
            }

            .left-col h1 {
                font-size: 2rem; /* Smaller font on mobile as requested */
                background: linear-gradient(180deg, #ffffff 0%, #aaaaaa 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .right-col {
                text-align: center; /* Centers details on mobile */
                width: 100%;
            }

            .right-col ul li {
                padding-left: 0;
            }
            .right-col ul li::before {
                display: none; /* Hide bullets on mobile centered view */
            }
            
            .right-col h2 { font-size: 1.6rem; }
            .right-col .subtitle { font-size: 0.9rem; }
            .right-col p, .right-col ul li { font-size: 1rem; }
        }
    </style>

        // ==========================================
        // ⚙️ RENDERING ENGINE & ANIMATIONS

        document.addEventListener("DOMContentLoaded", () => {

            const headerContainer = document.getElementById('header-container');
            headerContainer.innerHTML = `
                <div class="brand-left">
                    <div class="brand-name">${portfolioData.header.name}</div>
                    <div class="brand-title">${portfolioData.header.title}</div>
                </div>
                <div class="brand-right">
                    <a href="mailto:${portfolioData.header.email}" class="contact-link" onclick="gtag('event', 'email_click', { event_category: 'Engagement', event_label: 'Email Click' })">himanshusaini9683@gmail.com</a>
                    <a href="${portfolioData.header.linkedin}" target="_blank" class="contact-link" onclick="gtag('event', 'linkedin_click', { event_category: 'Engagement', event_label: 'LinkedIn Visit' })">LinkedIn</a>
                    <span href="blank" class="contact-link">${portfolioData.header.phone}</span>
                </div>
            `;

            // 2. Render Slides
            const slidesContainer = document.getElementById('slides-container');
            
            portfolioData.slides.forEach(slideData => {
                const slideHTML = `
                    <section class="slide" id="${slideData.id}">
                        <div class="slide-bg" style="background-image: url('${slideData.bgImage}');"></div>
                        <div class="content-wrapper">
                            <div class="left-col">
                                <h1>${slideData.leftTitle}</h1>
                            </div>
                            <div class="right-col">
                                ${slideData.rightContent}
                            </div>
                        </div>
                    </section>
                `;
                slidesContainer.insertAdjacentHTML('beforeend', slideHTML);
            });

            // 3. Initialize Animations (Intersection Observer)
            const slides = document.querySelectorAll('.slide');
            const observerOptions = {
                root: slidesContainer,
                threshold: 0.55 // Triggers when 55% of the slide is in view
            };

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                        gtag('event', 'page_view', { event_category: 'Engagement', event_label: `Viewed Slide: ${entry.target.id}` });
                    } else {
                        // Reset animation when scrolling away
                        entry.target.classList.remove('is-visible');
                    }
                });
            }, observerOptions);

            slides.forEach(slide => {
                observer.observe(slide);
            });
        });
